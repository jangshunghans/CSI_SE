<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>124-01-08</title>
    <style>
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            color: #333;
        }
        p {
            margin: 10px 0;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 20px 0;
        }
        table, th, td {
            border: 2px solid #999;
        }
        th, td {
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
                table tr td:first-child,
        table tr td:nth-child(2) {
            text-align: center;
        }
        table tr td:nth-child(3) {
            text-align: left;
        }

        .btn-wrap {
            margin: 16px 0;
        }
        .btn-wrap button {
            font-family: 'Malgun Gothic', '맑은 고딕', Arial, sans-serif;
            padding: 8px 20px;
            margin-right: 10px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #f5f5f5;
            color: #333;
            cursor: pointer;
        }
        .btn-wrap button:hover {
            background: #e8e8e8;
        }
        .btn-wrap button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #editableArea[contenteditable="true"] {
            outline: 1px dashed #4a90d9;
            padding: 4px;
            min-height: 100px;
        }
    </style>
</head>
<body>
<div class="btn-wrap">
    <button type="button" id="btnEdit">수정</button>
    <button type="button" id="btnSave" disabled>저장</button>
</div>
<div id="editableArea" contenteditable="false">
<p>[124-01-08] 산업안전보건법상 조도기준 및 조도기준 적용 예외 작업장</p>
<table>
<tr>
<td>구분</td>
<td>세부 항목</td>
<td>주요 내용</td>
</tr>
<tr>
<td>개요</td>
<td>조도의 정의</td>
<td>조도는 빛에 의한 밝기의 정도, 즉 면이 받는 광속의 밀도를 말하며 
단위는 럭스(lux)를 사용함.</td>
</tr>
<tr>
<td></td>
<td></td>
<td></td>
</tr>
<tr>
<td>야간작업
조도기준</td>
<td>KOSHA Guide
기준</td>
<td>야간 작업 건설공사장의 최소 조도 기준은 
한국산업안전보건공단(KOSHA) 가이드에 따라 
작업 종류·위치별로 별도 규정됨.</td>
</tr>
<tr>
<td>적용 예외 
작업장</td>
<td>조도기준
적용 예외</td>
<td>갱내 작업장과 감광재료를 
취급하는 작업장은 일반 작업장 
조도 기준 적용에서 예외로 함.</td>
</tr>
<tr>
<td colspan="3"></td>
</tr>

</table>
</div>
<script>
(function() {
    var btnEdit = document.getElementById('btnEdit');
    var btnSave = document.getElementById('btnSave');
    var area = document.getElementById('editableArea');
    var pathname = location.pathname || '';
    var filename = pathname.split('/').filter(Boolean).pop() || (document.title || 'document').trim() + '.html';
    if (!/\.html$/i.test(filename)) filename = filename + '.html';

    btnEdit.addEventListener('click', function() {
        area.setAttribute('contenteditable', 'true');
        area.focus();
        btnEdit.disabled = true;
        btnSave.disabled = false;
    });

    btnSave.addEventListener('click', function() {
        area.setAttribute('contenteditable', 'false');
        btnEdit.disabled = false;
        btnSave.disabled = true;
        var html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

        function doRefresh() { location.reload(); }

        function fallbackWithDialog() {
            if ('showSaveFilePicker' in window) {
                window.showSaveFilePicker({
                    suggestedName: filename,
                    types: [{ description: 'HTML file', accept: { 'text/html': ['.html'] } }]
                }).then(function(fileHandle) { return fileHandle.createWritable(); })
                  .then(function(writable) { return writable.write(html).then(function() { return writable.close(); }); })
                  .then(doRefresh).catch(function(err) {
                    if (err.name !== 'AbortError') alert('저장 실패: ' + (err.message || err));
                    btnSave.disabled = false;
                  });
            } else {
                var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
                var a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
                setTimeout(doRefresh, 300);
            }
        }

        var origin = location.origin || (location.protocol + '//' + location.host);
        fetch(origin + '/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: filename, content: html })
        }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
          .then(function(result) {
              if (result.ok && result.data && result.data.ok) doRefresh();
              else fallbackWithDialog();
          })
          .catch(function() { fallbackWithDialog(); });
    });
})();
</script>

</body>
</html>
